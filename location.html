<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Localisation - Portfolio Développeur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">RED-Dev</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-pills ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link active" href="location.html">Localisation</a></li>
                </ul>
            </div>
        </div>
    </nav>

<!-- Partie de la localisation -->
    <div class="container my-5">
        <h1 class="text-center mb-4 text-primary">Ma Localisation</h1>
        <p class="text-center mb-5">Découvrez où je suis basé et trouvez ma position actuelle.</p>

        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title">Ma position <i class="bi bi-geo-alt"></i></h5>
<iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3989.816084287384!2d29.29789507496461!3d-0.06065999993873963!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMMKwMDMnMzguNCJTIDI5wrAxOCcwMS43IkU!5e0!3m2!1sfr!2scd!4v1773833445718!5m2!1sfr!2scd" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mx-auto text-center">
                <button id="getLocationBtn" class="btn btn-primary btn-lg">
                    <i class="bi bi-geo-alt"></i> Ma Position Actuelle
                </button>
                <p id="locationInfo" class="mt-3 text-muted"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('getLocationBtn').addEventListener('click', function() {
            const btn = this;
            const info = document.getElementById('locationInfo');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Obtention de la position...';
            info.textContent = '';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    info.innerHTML = `<strong>Latitude:</strong> ${lat.toFixed(4)}<br><strong>Longitude:</strong> ${lon.toFixed(4)}<br><a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" class="btn btn-outline-primary btn-sm mt-2">Voir sur Google Maps</a>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-geo-alt"></i> Ma Position Actuelle';
                }, function(error) {
                    info.textContent = 'Erreur lors de l\'obtention de la position: ' + error.message;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-geo-alt"></i> Ma Position Actuelle';
                });
            } else {
                info.textContent = 'La géolocalisation n\'est pas supportée par ce navigateur.';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-geo-alt"></i> Ma Position Actuelle';
            }
        });
    </script>
</body>
</html>
